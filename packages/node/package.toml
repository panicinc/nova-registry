id = "node"
name = "Node.js"
description = "A cross-platform, open-source JavaScript runtime environment."
homepage = "https://nodejs.org"
licenses = ["MIT"]
categories = ["Runtime"]

[source]
id = "pkg:generic/nodejs/node@v24.8.0"

[[source.download]]
target = "darwin_arm64"
files = {
  node.tar.xz = "https://nodejs.org/download/release/{{version}}/node-{{version}}-darwin-arm64.tar.xz",
}
bin = {
  node = "node-{{version}}-darwin-arm64/bin/node",
  npm = "node-{{version}}-darwin-arm64/bin/npm",
  npx = "node-{{version}}-darwin-arm64/bin/npx",
}

[[source.download]]
target = "darwin_x64"
files = {
  node.tar.xz = "https://nodejs.org/download/release/{{version}}/node-{{version}}-darwin-x64.tar.xz",
}
bin = {
  node = "node-{{version}}-darwin-x64/bin/node",
  npm = "node-{{version}}-darwin-x64/bin/npm",
  npx = "node-{{version}}-darwin-x64/bin/npx",
}

[bin]
node = "{{source.download.bin.node}}"
npm = "{{source.download.bin.npm}}"
npx = "{{source.download.bin.npx}}"
