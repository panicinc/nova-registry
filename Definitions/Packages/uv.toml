id = "uv"
name = "uv"
description = "An extremely fast Python package and project manager, written in Rust."
homepage = "https://docs.astral.sh/uv/"
licenses = ["MIT", "Apache-2.0"]
categories = ["Runtime"]

[source]
id = "pkg:github/astral-sh/uv@0.11.8"

[[source.asset]]
target = "darwin_arm64"
file = "uv-aarch64-apple-darwin.tar.gz"
bin = { uv = "uv-aarch64-apple-darwin/uv", uvx = "uv-aarch64-apple-darwin/uvx" }

[[source.asset]]
target = "darwin_x64"
file = "uv-x86_64-apple-darwin.tar.gz"
bin = { uv = "uv-x86_64-apple-darwin/uv", uvx = "uv-x86_64-apple-darwin/uvx" }

[bin]
uv = "{{source.asset.bin.uv}}"
uvx = "{{source.asset.bin.uvx}}"
